# Local dev stack for the ARCH-COMP variant: Postgres + backend + the core frontend
# shell + a Cloudflare quick-tunnel for remote viewing.
#   docker compose up            -> frontend at http://localhost:5174
#   docker compose logs cloudflared | grep trycloudflare   -> the public URL
# Ports sit one above the VNN stack's so both variants can run side by side.
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: arch
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    working_dir: /app
    volumes:
      - ../comp-eval-platform:/core
      - .:/app
      - archdata:/data   # local benchmark/results git repos (DATA_DIR)
    environment:
      DJANGO_SETTINGS_MODULE: deploy.settings
      DATABASE_URL: postgres://postgres:postgres@db:5432/arch
      ACTIVE_COMPETITION: arch
      EXECUTION_BACKEND: local_docker
      # arch_comp/scripts is still a stub, so no submission can actually run yet —
      # leave the background job off rather than have it pick tasks up and fail them.
      SCHEDULER_AUTOSTART: "False"
      SECRET_KEY: dev-insecure
      DEBUG: "True"
      ROOT_URL: http://backend:8000
      DATA_DIR: /data
      BENCHMARK_SEED: "42"   # dev: generators need a seed arg; prod derives it per season
      SCRIPT_ROOT: /app/arch_comp
    command: >
      sh -c "pip install -q -e /core -e . &&
             python deploy/manage.py migrate &&
             python deploy/manage.py init_settings &&
             python deploy/manage.py runserver 0.0.0.0:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: node:20-slim
    working_dir: /app
    volumes:
      - ../comp-eval-platform/frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      VITE_API_URL: http://backend:8000   # Vite proxies /api and /update here
      VITE_USE_POLLING: "1"               # bind-mount fs events don't cross to the container
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5174:5173"
    depends_on:
      - backend

  # Cloudflare quick tunnel — free, no auth token. Prints an https://*.trycloudflare.com URL.
  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate --url http://frontend:5173
    depends_on:
      - frontend

volumes:
  pgdata:
  frontend_node_modules:
  archdata:
